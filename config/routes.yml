domains:
  - host: tochka.appline.tw1.ru
    routes:
      - path: /app
        upstream: http://tochka-frontend:80
      - path: /admin
        upstream: http://tochka-admin:80
      - path: /api
        upstream: http://tochka-backend:8000
        strip_prefix: false

  - host: forever.appline.tw1.ru
    routes:
      - path: /app
        upstream: http://forever-frontend:80
      - path: /admin
        upstream: http://forever-admin:80
      - path: /api
        upstream: http://forever-backend:8000
        strip_prefix: false

  - host: portal.appline.tw1.ru
    routes:
      - path: /app
        upstream: http://portal-frontend:80

  - host: bilet.appline.tw1.ru
    client_ca: /etc/nginx/client-ca/bilet-client-ca.crt
    require_client_cert: true
    routes:
      - path: /
        upstream: http://bilet-frontend:8000
        strip_prefix: false

  - host: quiz10.appline.tw1.ru
    routes:
      - path: /app
        upstream: http://quiz10-frontend:80
      - path: /admin
        upstream: http://quiz10-admin:80
      - path: /api
        upstream: http://quiz10-backend:8000
        strip_prefix: false

  - host: poputi.appline.tw1.ru
    routes:
      - path: /app
        upstream: http://poputi-frontend:80
      - path: /admin
        upstream: http://poputi-admin:80
      - path: /api
        upstream: http://poputi-backend:8000
        strip_prefix: false
