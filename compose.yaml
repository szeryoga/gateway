services:
  gateway:
    container_name: gateway
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/routes.yml:/app/config/routes.yml:ro
      - ./nginx/nginx.conf.template:/app/nginx/nginx.conf.template:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - gateway

networks:
  gateway:
    external: true
    name: ${GATEWAY_NETWORK}
